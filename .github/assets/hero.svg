<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" fill="none">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="conf-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.35" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.02" />
    </linearGradient>
    <linearGradient id="divider-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0" />
      <stop offset="30%" style="stop-color:#6366f1;stop-opacity:0.3" />
      <stop offset="70%" style="stop-color:#22d3ee;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:0" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#6366f1" flood-opacity="0.4"/>
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="line-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="340" rx="16" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="40" x2="800" y2="40" stroke="#818cf8" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="800" y2="80" stroke="#818cf8" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="800" y2="120" stroke="#818cf8" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="800" y2="160" stroke="#818cf8" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#818cf8" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="800" y2="240" stroke="#818cf8" stroke-width="0.5"/>
    <line x1="0" y1="280" x2="800" y2="280" stroke="#818cf8" stroke-width="0.5"/>
    <line x1="0" y1="320" x2="800" y2="320" stroke="#818cf8" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="340" stroke="#818cf8" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="340" stroke="#818cf8" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="340" stroke="#818cf8" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="340" stroke="#818cf8" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="340" stroke="#818cf8" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="340" stroke="#818cf8" stroke-width="0.5"/>
    <line x1="700" y1="0" x2="700" y2="340" stroke="#818cf8" stroke-width="0.5"/>
  </g>

  <!-- ===== UPPER: LOGO SECTION ===== -->

  <!-- Vector arrows decorative -->
  <g opacity="0.12" filter="url(#glow-filter)">
    <path d="M 50 140 L 120 55" stroke="#22d3ee" stroke-width="1.5"/>
    <polygon points="120,55 114,65 124,67" fill="#22d3ee"/>
    <path d="M 50 140 L 150 100" stroke="#818cf8" stroke-width="1.5"/>
    <polygon points="150,100 140,102 142,94" fill="#818cf8"/>
    <path d="M 50 140 L 100 160" stroke="#a78bfa" stroke-width="1.5"/>
    <polygon points="100,160 92,154 90,164" fill="#a78bfa"/>

    <path d="M 680 35 L 750 120" stroke="#22d3ee" stroke-width="1.5"/>
    <polygon points="750,120 744,110 754,108" fill="#22d3ee"/>
    <path d="M 680 35 L 720 30" stroke="#818cf8" stroke-width="1.5"/>
    <polygon points="720,30 712,25 710,35" fill="#818cf8"/>
  </g>

  <!-- Orbital rings -->
  <ellipse cx="400" cy="90" rx="340" ry="22" stroke="url(#accent)" stroke-width="0.7" fill="none" opacity="0.1"/>
  <ellipse cx="400" cy="90" rx="290" ry="40" stroke="url(#accent)" stroke-width="0.5" fill="none" opacity="0.06" transform="rotate(-6, 400, 90)"/>

  <!-- Tilde symbol -->
  <text x="195" y="115" font-family="Georgia, serif" font-size="72" fill="url(#glow)" filter="url(#shadow)" opacity="0.9">&#x223F;</text>

  <!-- Main title -->
  <text x="260" y="112" font-family="'Segoe UI', 'SF Pro Display', -apple-system, sans-serif" font-size="80" font-weight="800" fill="url(#glow)" filter="url(#shadow)" letter-spacing="-2">VECTRIX</text>

  <!-- Tagline -->
  <text x="400" y="150" font-family="'Segoe UI', 'SF Pro Display', -apple-system, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle" letter-spacing="6" font-weight="300">NAVIGATE THE VECTOR SPACE OF TIME</text>

  <!-- Version dot -->
  <circle cx="635" cy="72" r="4" fill="#22d3ee" opacity="0.8"/>

  <!-- Decorative dots -->
  <circle cx="60" cy="25" r="2" fill="#6366f1" opacity="0.3"/>
  <circle cx="90" cy="40" r="1.5" fill="#22d3ee" opacity="0.2"/>
  <circle cx="740" cy="150" r="2" fill="#6366f1" opacity="0.3"/>
  <circle cx="760" cy="160" r="1.5" fill="#22d3ee" opacity="0.2"/>

  <!-- ===== DIVIDER ===== -->
  <line x1="60" y1="180" x2="740" y2="180" stroke="url(#divider-grad)" stroke-width="1"/>

  <!-- ===== LOWER: FORECAST GRAPH ===== -->

  <!-- Confidence interval area -->
  <path d="M 500 245 Q 540 225, 560 235 Q 580 245, 600 228 Q 620 210, 640 220 Q 660 230, 680 215 Q 700 200, 730 210 L 730 290 Q 700 275, 680 285 Q 660 295, 640 290 Q 620 285, 600 295 Q 580 305, 560 292 Q 540 280, 500 275 Z" fill="url(#conf-grad)"/>

  <!-- Historical data line -->
  <path d="M 60 270 Q 100 252, 140 262 Q 180 272, 220 255 Q 260 238, 300 252 Q 340 265, 380 248 Q 420 230, 460 245 Q 480 253, 500 248"
        stroke="url(#line-grad)" stroke-width="2.5" fill="none" stroke-linecap="round" filter="url(#line-glow)"/>

  <!-- Prediction line (dashed) -->
  <path d="M 500 248 Q 540 230, 560 238 Q 580 246, 600 232 Q 620 215, 640 224 Q 660 233, 680 220 Q 700 208, 730 215"
        stroke="#22d3ee" stroke-width="2" fill="none" stroke-dasharray="8,4" stroke-linecap="round" opacity="0.8"/>

  <!-- NOW marker -->
  <line x1="500" y1="195" x2="500" y2="310" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <text x="500" y="193" font-family="'Segoe UI', sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle" opacity="0.7">NOW</text>

  <!-- Historical data points -->
  <circle cx="140" cy="262" r="2.5" fill="#6366f1" opacity="0.5"/>
  <circle cx="220" cy="255" r="2.5" fill="#6366f1" opacity="0.55"/>
  <circle cx="300" cy="252" r="2.5" fill="#6366f1" opacity="0.6"/>
  <circle cx="380" cy="248" r="2.5" fill="#818cf8" opacity="0.65"/>
  <circle cx="460" cy="245" r="2.5" fill="#818cf8" opacity="0.7"/>
  <circle cx="500" cy="248" r="3.5" fill="#f59e0b" opacity="0.9"/>

  <!-- Predicted points -->
  <circle cx="560" cy="238" r="2" fill="#22d3ee" opacity="0.5"/>
  <circle cx="640" cy="224" r="2" fill="#22d3ee" opacity="0.4"/>
  <circle cx="730" cy="215" r="2" fill="#22d3ee" opacity="0.3"/>

  <!-- Labels -->
  <text x="270" y="318" font-family="'Segoe UI', sans-serif" font-size="9" fill="#64748b" text-anchor="middle" letter-spacing="3">HISTORICAL DATA</text>
  <text x="620" y="318" font-family="'Segoe UI', sans-serif" font-size="9" fill="#22d3ee" text-anchor="middle" letter-spacing="3" opacity="0.6">PREDICTION</text>
</svg>
