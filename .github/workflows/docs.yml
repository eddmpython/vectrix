name: Deploy Docs

on:
  push:
    branches: [master]
    paths:
      - 'landing/**'
      - 'docs/**'
      - 'llms.txt'
      - 'llms-full.txt'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build SvelteKit site
        working-directory: landing
        run: |
          npm ci
          BASE_PATH=/vectrix npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build MkDocs site
        run: |
          pip install mkdocs mkdocs-material mkdocstrings mkdocstrings-python
          mkdocs build --strict

      - name: Prepare deploy directory
        run: |
          mkdir -p _deploy
          cp -r landing/build/* _deploy/
          cp -r site _deploy/docs
          cp llms.txt _deploy/llms.txt || true
          cp llms-full.txt _deploy/llms-full.txt || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _deploy/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
