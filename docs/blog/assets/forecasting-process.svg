<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200" fill="none">
  <defs>
    <linearGradient id="pbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" rx="12" fill="url(#pbg)"/>
  <rect x="0.5" y="0.5" width="799" height="199" rx="12" stroke="#334155" stroke-width="1" fill="none"/>

  <!-- Step 1 -->
  <rect x="20" y="50" width="95" height="70" rx="8" fill="rgba(6,182,212,0.08)" stroke="rgba(6,182,212,0.25)" stroke-width="1"/>
  <text x="67" y="74" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#06b6d4">1</text>
  <text x="67" y="93" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#94a3b8">Collect</text>
  <text x="67" y="106" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">Data</text>

  <!-- Arrow -->
  <path d="M120,85 L135,85" stroke="#334155" stroke-width="1.5" marker-end="url(#arw)"/>
  <defs><marker id="arw" viewBox="0 0 6 6" refX="6" refY="3" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L6,3 L0,6" fill="#334155"/></marker></defs>

  <!-- Step 2 -->
  <rect x="140" y="50" width="95" height="70" rx="8" fill="rgba(139,92,246,0.08)" stroke="rgba(139,92,246,0.25)" stroke-width="1"/>
  <text x="187" y="74" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#8b5cf6">2</text>
  <text x="187" y="93" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#94a3b8">Identify</text>
  <text x="187" y="106" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">Patterns</text>

  <!-- Arrow -->
  <path d="M240,85 L255,85" stroke="#334155" stroke-width="1.5" marker-end="url(#arw)"/>

  <!-- Step 3 -->
  <rect x="260" y="50" width="95" height="70" rx="8" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.25)" stroke-width="1"/>
  <text x="307" y="74" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#f59e0b">3</text>
  <text x="307" y="93" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#94a3b8">Choose</text>
  <text x="307" y="106" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">Model</text>

  <!-- Arrow -->
  <path d="M360,85 L375,85" stroke="#334155" stroke-width="1.5" marker-end="url(#arw)"/>

  <!-- Step 4 -->
  <rect x="380" y="50" width="95" height="70" rx="8" fill="rgba(16,185,129,0.08)" stroke="rgba(16,185,129,0.25)" stroke-width="1"/>
  <text x="427" y="74" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#10b981">4</text>
  <text x="427" y="93" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#94a3b8">Fit</text>
  <text x="427" y="106" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">Model</text>

  <!-- Arrow -->
  <path d="M480,85 L495,85" stroke="#334155" stroke-width="1.5" marker-end="url(#arw)"/>

  <!-- Step 5 -->
  <rect x="500" y="50" width="95" height="70" rx="8" fill="rgba(236,72,153,0.08)" stroke="rgba(236,72,153,0.25)" stroke-width="1"/>
  <text x="547" y="74" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#ec4899">5</text>
  <text x="547" y="93" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#94a3b8">Forecast</text>
  <text x="547" y="106" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">Future</text>

  <!-- Arrow -->
  <path d="M600,85 L615,85" stroke="#334155" stroke-width="1.5" marker-end="url(#arw)"/>

  <!-- Step 6 -->
  <rect x="620" y="50" width="95" height="70" rx="8" fill="rgba(99,102,241,0.08)" stroke="rgba(99,102,241,0.25)" stroke-width="1"/>
  <text x="667" y="74" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#6366f1">6</text>
  <text x="667" y="93" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#94a3b8">Evaluate</text>
  <text x="667" y="106" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">&amp; Iterate</text>

  <!-- Feedback loop arrow -->
  <path d="M715,120 C730,140 730,160 667,165 C400,175 187,170 67,165 C30,163 20,145 20,130 L20,120" stroke="#334155" stroke-width="1" stroke-dasharray="3,3" fill="none" marker-end="url(#arw)"/>
  <text x="400" y="165" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#334155">continuous improvement</text>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#f8fafc">The Forecasting Process</text>
</svg>