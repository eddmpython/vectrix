<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="line5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg5)" rx="12"/>

  <!-- Raw time series (center) -->
  <polyline points="80,200 120,180 160,195 200,160 240,170 280,140 320,155 360,130 400,145 440,120 480,135 520,110 560,125 580,105" fill="none" stroke="url(#line5)" stroke-width="3" stroke-linecap="round"/>

  <!-- Lens 1: ETS -->
  <rect x="40" y="30" width="160" height="70" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5" opacity="0.9"/>
  <text x="120" y="55" text-anchor="middle" fill="#6366f1" font-family="Inter,sans-serif" font-size="13" font-weight="700">ETS</text>
  <text x="120" y="75" text-anchor="middle" fill="#94a3b8" font-family="Inter,sans-serif" font-size="10">Level + Trend + Season</text>
  <line x1="120" y1="100" x2="120" y2="180" stroke="#6366f1" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>

  <!-- Lens 2: Theta -->
  <rect x="220" y="30" width="160" height="70" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="1.5" opacity="0.9"/>
  <text x="300" y="55" text-anchor="middle" fill="#a855f7" font-family="Inter,sans-serif" font-size="13" font-weight="700">Theta</text>
  <text x="300" y="75" text-anchor="middle" fill="#94a3b8" font-family="Inter,sans-serif" font-size="10">Curvature Control</text>
  <line x1="300" y1="100" x2="300" y2="155" stroke="#a855f7" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>

  <!-- Lens 3: ARIMA -->
  <rect x="400" y="30" width="160" height="70" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="1.5" opacity="0.9"/>
  <text x="480" y="55" text-anchor="middle" fill="#22c55e" font-family="Inter,sans-serif" font-size="13" font-weight="700">ARIMA</text>
  <text x="480" y="75" text-anchor="middle" fill="#94a3b8" font-family="Inter,sans-serif" font-size="10">Autocorrelation</text>
  <line x1="480" y1="100" x2="480" y2="135" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>

  <!-- Lens 4: Special -->
  <rect x="580" y="30" width="180" height="70" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" opacity="0.9"/>
  <text x="670" y="55" text-anchor="middle" fill="#f59e0b" font-family="Inter,sans-serif" font-size="13" font-weight="700">Specialists</text>
  <text x="670" y="75" text-anchor="middle" fill="#94a3b8" font-family="Inter,sans-serif" font-size="10">GARCH · Croston · TBATS</text>
  <line x1="570" y1="100" x2="560" y2="125" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>

  <!-- Bottom labels -->
  <rect x="50" y="280" width="700" height="80" rx="8" fill="#1e293b" opacity="0.6"/>
  <text x="400" y="310" text-anchor="middle" fill="#f1f5f9" font-family="Inter,sans-serif" font-size="15" font-weight="600">Same Data, Different Perspectives</text>
  <text x="400" y="335" text-anchor="middle" fill="#94a3b8" font-family="Inter,sans-serif" font-size="12">Each model sees patterns others miss — that's why ensembles work</text>

  <!-- Small icons in bottom -->
  <circle cx="170" cy="310" r="4" fill="#6366f1"/>
  <circle cx="300" cy="310" r="4" fill="#a855f7"/>
  <circle cx="500" cy="310" r="4" fill="#22c55e"/>
  <circle cx="630" cy="310" r="4" fill="#f59e0b"/>
</svg>
