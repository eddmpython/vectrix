<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420" fill="none">
  <defs>
    <linearGradient id="dtbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" rx="12" fill="url(#dtbg)"/>
  <rect x="0.5" y="0.5" width="799" height="419" rx="12" stroke="#334155" stroke-width="1" fill="none"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#64748b" letter-spacing="0.05em">WHICH LIBRARY SHOULD I USE?</text>

  <!-- Root question -->
  <rect x="280" y="48" width="240" height="40" rx="8" fill="rgba(6,182,212,0.08)" stroke="rgba(6,182,212,0.3)" stroke-width="1"/>
  <text x="400" y="73" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#22d3ee">What is your priority?</text>

  <!-- Lines from root -->
  <line x1="320" y1="88" x2="140" y2="120" stroke="#334155" stroke-width="1"/>
  <line x1="400" y1="88" x2="400" y2="120" stroke="#334155" stroke-width="1"/>
  <line x1="480" y1="88" x2="660" y2="120" stroke="#334155" stroke-width="1"/>

  <!-- Branch labels -->
  <text x="210" y="104" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">Speed at scale</text>
  <text x="400" y="112" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">Simplicity</text>
  <text x="590" y="104" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">DL / research</text>

  <!-- Speed branch -->
  <rect x="40" y="122" width="200" height="38" rx="6" fill="rgba(6,182,212,0.06)" stroke="rgba(6,182,212,0.2)" stroke-width="1"/>
  <text x="140" y="140" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8">How many time series?</text>
  <text x="140" y="154" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">(thousands vs. a few)</text>

  <line x1="90" y1="160" x2="90" y2="186" stroke="#334155" stroke-width="1"/>
  <line x1="190" y1="160" x2="190" y2="186" stroke="#334155" stroke-width="1"/>

  <text x="90" y="180" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#64748b">1,000+</text>
  <text x="190" y="180" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#64748b">A few</text>

  <rect x="24" y="188" width="132" height="36" rx="6" fill="rgba(6,182,212,0.1)" stroke="#06b6d4" stroke-width="1"/>
  <text x="90" y="210" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#22d3ee">statsforecast</text>

  <rect x="168" y="188" width="72" height="36" rx="6" fill="rgba(6,182,212,0.06)" stroke="rgba(6,182,212,0.2)" stroke-width="1"/>
  <text x="204" y="210" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#22d3ee">statsmodels</text>

  <!-- Simplicity branch -->
  <rect x="300" y="122" width="200" height="38" rx="6" fill="rgba(139,92,246,0.06)" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>
  <text x="400" y="140" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8">Do you want zero config?</text>
  <text x="400" y="154" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">(auto everything vs. control)</text>

  <line x1="350" y1="160" x2="350" y2="186" stroke="#334155" stroke-width="1"/>
  <line x1="450" y1="160" x2="450" y2="186" stroke="#334155" stroke-width="1"/>

  <text x="350" y="180" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#64748b">Yes, auto</text>
  <text x="450" y="180" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#64748b">Some control</text>

  <rect x="294" y="188" width="112" height="36" rx="6" fill="rgba(99,102,241,0.1)" stroke="#6366f1" stroke-width="1.5"/>
  <text x="350" y="210" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" fill="#818cf8">Vectrix</text>

  <rect x="418" y="188" width="72" height="36" rx="6" fill="rgba(245,158,11,0.06)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <text x="454" y="210" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#fbbf24">Prophet</text>

  <!-- DL branch -->
  <rect x="560" y="122" width="200" height="38" rx="6" fill="rgba(245,158,11,0.06)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <text x="660" y="140" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8">Do you need one API</text>
  <text x="660" y="154" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">for stat + DL models?</text>

  <line x1="610" y1="160" x2="610" y2="186" stroke="#334155" stroke-width="1"/>
  <line x1="710" y1="160" x2="710" y2="186" stroke="#334155" stroke-width="1"/>

  <text x="610" y="180" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#64748b">Yes, unified</text>
  <text x="710" y="180" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#64748b">DL only</text>

  <rect x="556" y="188" width="108" height="36" rx="6" fill="rgba(139,92,246,0.06)" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>
  <text x="610" y="210" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#a78bfa">Darts / sktime</text>

  <rect x="676" y="188" width="80" height="36" rx="6" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.25)" stroke-width="1"/>
  <text x="716" y="210" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#fbbf24">NeuralForecast</text>

  <!-- Second layer: sklearn question -->
  <line x1="610" y1="224" x2="610" y2="248" stroke="#334155" stroke-width="1"/>
  <rect x="530" y="250" width="160" height="32" rx="6" fill="rgba(139,92,246,0.04)" stroke="rgba(139,92,246,0.15)" stroke-width="1"/>
  <text x="610" y="271" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#94a3b8">Want sklearn pipeline?</text>

  <line x1="570" y1="282" x2="570" y2="302" stroke="#334155" stroke-width="1"/>
  <line x1="650" y1="282" x2="650" y2="302" stroke="#334155" stroke-width="1"/>

  <text x="570" y="296" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#64748b">Yes</text>
  <text x="650" y="296" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#64748b">No</text>

  <rect x="530" y="304" width="80" height="30" rx="6" fill="rgba(139,92,246,0.06)" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>
  <text x="570" y="323" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#a78bfa">sktime</text>

  <rect x="616" y="304" width="68" height="30" rx="6" fill="rgba(139,92,246,0.06)" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>
  <text x="650" y="323" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#a78bfa">Darts</text>

  <!-- Bottom summary -->
  <rect x="52" y="360" width="696" height="44" rx="8" fill="rgba(148,163,184,0.03)" stroke="rgba(148,163,184,0.08)" stroke-width="1"/>
  <text x="400" y="380" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#e2e8f0">No single library is best for everything.</text>
  <text x="400" y="396" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">Match the tool to your problem, data size, and team's expertise.</text>
</svg>