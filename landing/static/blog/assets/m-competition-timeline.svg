<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300" fill="none">
  <defs>
    <linearGradient id="mtbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="300" rx="12" fill="url(#mtbg)"/>
  <rect x="0.5" y="0.5" width="799" height="299" rx="12" stroke="#334155" stroke-width="1" fill="none"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#64748b" letter-spacing="0.05em">THE M COMPETITION TIMELINE</text>

  <!-- Main timeline line -->
  <line x1="60" y1="120" x2="740" y2="120" stroke="#334155" stroke-width="2"/>

  <!-- M1 — 1982 -->
  <circle cx="110" cy="120" r="18" fill="rgba(148,163,184,0.08)" stroke="#64748b" stroke-width="1.5"/>
  <text x="110" y="124" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#94a3b8">M1</text>
  <text x="110" y="96" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#475569">1982</text>
  <line x1="110" y1="138" x2="110" y2="158" stroke="#334155" stroke-width="1"/>
  <text x="110" y="172" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#94a3b8">111 series</text>
  <text x="110" y="186" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#64748b">"Simple beats</text>
  <text x="110" y="198" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#64748b">complex"</text>

  <!-- M2 — 1986 -->
  <circle cx="220" cy="120" r="14" fill="rgba(148,163,184,0.06)" stroke="#475569" stroke-width="1"/>
  <text x="220" y="124" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#64748b">M2</text>
  <text x="220" y="96" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#475569">1986</text>
  <line x1="220" y1="134" x2="220" y2="158" stroke="#334155" stroke-width="1"/>
  <text x="220" y="172" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#64748b">29 series</text>
  <text x="220" y="186" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#475569">+ Judgment</text>

  <!-- M3 — 2000 -->
  <circle cx="370" cy="120" r="20" fill="rgba(139,92,246,0.08)" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="370" y="124" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#a78bfa">M3</text>
  <text x="370" y="93" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#8b5cf6">2000</text>
  <line x1="370" y1="140" x2="370" y2="158" stroke="#8b5cf6" stroke-width="1" opacity="0.4"/>
  <text x="370" y="172" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#a78bfa">3,003 series</text>
  <text x="370" y="186" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#64748b">Theta method</text>
  <text x="370" y="198" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#64748b">wins</text>

  <!-- M4 — 2018 (highlighted) -->
  <circle cx="520" cy="120" r="26" fill="rgba(6,182,212,0.1)" stroke="#06b6d4" stroke-width="2"/>
  <text x="520" y="125" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="800" fill="#22d3ee">M4</text>
  <text x="520" y="86" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#06b6d4">2018</text>
  <line x1="520" y1="146" x2="520" y2="158" stroke="#06b6d4" stroke-width="1" opacity="0.5"/>
  <rect x="462" y="162" width="116" height="52" rx="6" fill="rgba(6,182,212,0.06)" stroke="rgba(6,182,212,0.15)" stroke-width="1"/>
  <text x="520" y="178" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#22d3ee">100,000 series</text>
  <text x="520" y="193" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#06b6d4">Hybrid era begins</text>
  <text x="520" y="206" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#06b6d4">ES-RNN wins</text>

  <!-- M5 — 2020 -->
  <circle cx="630" cy="120" r="18" fill="rgba(245,158,11,0.08)" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="630" y="124" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#fbbf24">M5</text>
  <text x="630" y="96" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#f59e0b">2020</text>
  <line x1="630" y1="138" x2="630" y2="158" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>
  <text x="630" y="172" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#fbbf24">Walmart data</text>
  <text x="630" y="186" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#64748b">LightGBM</text>
  <text x="630" y="198" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#64748b">dominates</text>

  <!-- M6 — 2022 -->
  <circle cx="720" cy="120" r="16" fill="rgba(16,185,129,0.08)" stroke="#10b981" stroke-width="1.5"/>
  <text x="720" y="124" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#34d399">M6</text>
  <text x="720" y="96" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#10b981">2022</text>
  <line x1="720" y1="136" x2="720" y2="158" stroke="#10b981" stroke-width="1" opacity="0.4"/>
  <text x="720" y="172" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#34d399">Finance</text>
  <text x="720" y="186" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#64748b">Uncertainty</text>
  <text x="720" y="198" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#64748b">focus</text>

  <!-- Scale indicator -->
  <text x="400" y="252" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#334155">Scale of data grows exponentially</text>
  <line x1="120" y1="264" x2="680" y2="264" stroke="#1e293b" stroke-width="1"/>
  <polygon points="676,261 684,264 676,267" fill="#334155"/>
  <text x="120" y="280" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#475569">111</text>
  <text x="370" y="280" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#475569">3,003</text>
  <text x="520" y="280" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#06b6d4" font-weight="600">100,000</text>
  <text x="640" y="280" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#475569">42,840</text>
</svg>