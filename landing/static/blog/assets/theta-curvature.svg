<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <linearGradient id="bg7" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="350" fill="url(#bg7)" rx="12"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#f1f5f9" font-family="Inter,sans-serif" font-size="14" font-weight="600">Theta Lines: Controlling Curvature</text>

  <!-- Vertical separator (forecast boundary) -->
  <line x1="500" y1="50" x2="500" y2="300" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <text x="500" y="315" text-anchor="middle" fill="#94a3b8" font-family="Inter,sans-serif" font-size="10">forecast →</text>

  <!-- Original data (historical) -->
  <polyline points="60,220 100,200 140,210 180,185 220,195 260,175 300,180 340,160 380,170 420,150 460,155 500,140" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

  <!-- θ=0: Pure linear trend (blue) -->
  <line x1="60" y1="225" x2="500" y2="140" stroke="#22c55e" stroke-width="1.5" opacity="0.7"/>
  <line x1="500" y1="140" x2="720" y2="90" stroke="#22c55e" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="725" y="90" fill="#22c55e" font-family="Inter,sans-serif" font-size="11" font-weight="600">θ=0</text>
  <text x="725" y="105" fill="#22c55e" font-family="Inter,sans-serif" font-size="9" opacity="0.7">pure trend</text>

  <!-- θ=1: Original series (purple) -->
  <polyline points="500,140 540,130 580,135 620,125 660,128 700,120" fill="none" stroke="#a855f7" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="725" y="123" fill="#a855f7" font-family="Inter,sans-serif" font-size="11" font-weight="600">θ=1</text>
  <text x="725" y="138" fill="#a855f7" font-family="Inter,sans-serif" font-size="9" opacity="0.7">original</text>

  <!-- θ=2: Double curvature / SES (indigo, main) -->
  <polyline points="500,140 540,142 580,143 620,143 660,144 700,144" fill="none" stroke="#6366f1" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="725" y="148" fill="#6366f1" font-family="Inter,sans-serif" font-size="11" font-weight="600">θ=2</text>
  <text x="725" y="163" fill="#6366f1" font-family="Inter,sans-serif" font-size="9" opacity="0.7">smoothed</text>

  <!-- θ=3: Maximum smoothing (yellow) -->
  <polyline points="500,140 540,148 580,154 620,158 660,161 700,163" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="725" y="168" fill="#f59e0b" font-family="Inter,sans-serif" font-size="11" font-weight="600">θ=3</text>
  <text x="725" y="183" fill="#f59e0b" font-family="Inter,sans-serif" font-size="9" opacity="0.7">conservative</text>

  <!-- Explanation boxes -->
  <rect x="60" y="255" width="200" height="50" rx="6" fill="#1e293b" stroke="#22c55e" stroke-width="1" opacity="0.8"/>
  <text x="160" y="275" text-anchor="middle" fill="#22c55e" font-family="Inter,sans-serif" font-size="10" font-weight="600">θ → 0: more trend</text>
  <text x="160" y="292" text-anchor="middle" fill="#94a3b8" font-family="Inter,sans-serif" font-size="9">extrapolates the slope</text>

  <rect x="300" y="255" width="200" height="50" rx="6" fill="#1e293b" stroke="#6366f1" stroke-width="1" opacity="0.8"/>
  <text x="400" y="275" text-anchor="middle" fill="#6366f1" font-family="Inter,sans-serif" font-size="10" font-weight="600">θ → 2: more smoothing</text>
  <text x="400" y="292" text-anchor="middle" fill="#94a3b8" font-family="Inter,sans-serif" font-size="9">flattens toward the mean</text>

  <rect x="540" y="255" width="200" height="50" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1" opacity="0.8"/>
  <text x="640" y="275" text-anchor="middle" fill="#f59e0b" font-family="Inter,sans-serif" font-size="10" font-weight="600">θ → 3: conservative</text>
  <text x="640" y="292" text-anchor="middle" fill="#94a3b8" font-family="Inter,sans-serif" font-size="9">safe, regression-to-mean</text>
</svg>
