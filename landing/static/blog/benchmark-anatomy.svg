<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280" fill="none">
  <defs>
    <linearGradient id="babg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="280" rx="12" fill="url(#babg)"/>
  <rect x="0.5" y="0.5" width="799" height="279" rx="12" stroke="#334155" stroke-width="1" fill="none"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#64748b" letter-spacing="0.05em">ANATOMY OF A GOOD BENCHMARK</text>

  <!-- Box 1 — Dataset -->
  <rect x="40" y="52" width="166" height="100" rx="8" fill="rgba(6,182,212,0.06)" stroke="rgba(6,182,212,0.2)" stroke-width="1"/>
  <circle cx="123" cy="82" r="16" fill="rgba(6,182,212,0.1)"/>
  <text x="123" y="87" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#06b6d4">&#128202;</text>
  <text x="123" y="110" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#22d3ee">Standard Dataset</text>
  <text x="123" y="126" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">Public, diverse,</text>
  <text x="123" y="139" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">agreed upon by all</text>

  <!-- Arrow 1 -->
  <line x1="210" y1="102" x2="230" y2="102" stroke="#334155" stroke-width="1.5"/>
  <polygon points="230,98 238,102 230,106" fill="#334155"/>

  <!-- Box 2 — Baseline -->
  <rect x="242" y="52" width="166" height="100" rx="8" fill="rgba(245,158,11,0.06)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <circle cx="325" cy="82" r="16" fill="rgba(245,158,11,0.1)"/>
  <text x="325" y="87" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#f59e0b">&#9878;</text>
  <text x="325" y="110" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#fbbf24">Naive Baseline</text>
  <text x="325" y="126" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">Minimum bar —</text>
  <text x="325" y="139" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">must beat this</text>

  <!-- Arrow 2 -->
  <line x1="412" y1="102" x2="432" y2="102" stroke="#334155" stroke-width="1.5"/>
  <polygon points="432,98 440,102 432,106" fill="#334155"/>

  <!-- Box 3 — Rules -->
  <rect x="444" y="52" width="166" height="100" rx="8" fill="rgba(139,92,246,0.06)" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>
  <circle cx="527" cy="82" r="16" fill="rgba(139,92,246,0.1)"/>
  <text x="527" y="87" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#8b5cf6">&#9881;</text>
  <text x="527" y="110" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#a78bfa">Clear Rules</text>
  <text x="527" y="126" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">Same conditions,</text>
  <text x="527" y="139" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">no cherry-picking</text>

  <!-- Arrow 3 -->
  <line x1="614" y1="102" x2="634" y2="102" stroke="#334155" stroke-width="1.5"/>
  <polygon points="634,98 642,102 634,106" fill="#334155"/>

  <!-- Box 4 — Metrics -->
  <rect x="646" y="52" width="114" height="100" rx="8" fill="rgba(16,185,129,0.06)" stroke="rgba(16,185,129,0.2)" stroke-width="1"/>
  <circle cx="703" cy="82" r="16" fill="rgba(16,185,129,0.1)"/>
  <text x="703" y="87" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#10b981">&#128200;</text>
  <text x="703" y="110" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#34d399">Metrics</text>
  <text x="703" y="126" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">Same formulas,</text>
  <text x="703" y="139" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">comparable results</text>

  <!-- Bottom summary bar -->
  <rect x="40" y="180" width="720" height="80" rx="8" fill="rgba(148,163,184,0.03)" stroke="rgba(148,163,184,0.08)" stroke-width="1"/>
  <text x="400" y="206" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">Like the Olympics for forecasting</text>
  <text x="400" y="226" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b">Same track. Same distance. Same clock. That's what makes comparison meaningful.</text>
  <text x="400" y="246" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#475569">Without standardized benchmarks, every claim is just marketing.</text>
</svg>