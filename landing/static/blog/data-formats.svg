<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" width="800" height="260" fill="none">
  <defs>
    <linearGradient id="dfbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="260" rx="12" fill="url(#dfbg)"/>
  <rect x="0.5" y="0.5" width="799" height="259" rx="12" stroke="#334155" stroke-width="1" fill="none"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#94a3b8">VECTRIX ACCEPTS ANY FORMAT</text>

  <!-- Box 1: Python list -->
  <rect x="25" y="50" width="115" height="70" rx="6" fill="#020617" stroke="#06b6d4" stroke-width="1"/>
  <text x="82" y="70" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#06b6d4">Python list</text>
  <text x="82" y="92" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#64748b">[1, 2, 3, 5]</text>
  <text x="82" y="108" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#64748b">[8, 13, 21]</text>

  <!-- Box 2: NumPy -->
  <rect x="155" y="50" width="115" height="70" rx="6" fill="#020617" stroke="#22d3ee" stroke-width="1"/>
  <text x="212" y="70" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#22d3ee">NumPy array</text>
  <text x="212" y="92" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#64748b">np.array([</text>
  <text x="212" y="108" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#64748b">  1, 2, 3])</text>

  <!-- Box 3: pandas Series -->
  <rect x="285" y="50" width="115" height="70" rx="6" fill="#020617" stroke="#8b5cf6" stroke-width="1"/>
  <text x="342" y="70" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#8b5cf6">pd.Series</text>
  <text x="342" y="92" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#64748b">pd.Series(</text>
  <text x="342" y="108" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#64748b">  [1, 2, 3])</text>

  <!-- Box 4: DataFrame -->
  <rect x="415" y="50" width="115" height="70" rx="6" fill="#020617" stroke="#a855f7" stroke-width="1"/>
  <text x="472" y="70" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#a855f7">DataFrame</text>
  <text x="472" y="92" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#64748b">date | value</text>
  <text x="472" y="108" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#64748b">col  | col</text>

  <!-- Box 5: CSV -->
  <rect x="545" y="50" width="115" height="70" rx="6" fill="#020617" stroke="#f472b6" stroke-width="1"/>
  <text x="602" y="70" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#f472b6">CSV path</text>
  <text x="602" y="92" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#64748b">"data.csv"</text>
  <text x="602" y="108" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#64748b">auto-detect</text>

  <!-- Box 6: dict -->
  <rect x="670" y="50" width="105" height="70" rx="6" fill="#020617" stroke="#fbbf24" stroke-width="1"/>
  <text x="722" y="70" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#fbbf24">dict</text>
  <text x="722" y="92" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#64748b">{"date":[],</text>
  <text x="722" y="108" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#64748b"> "val":[]}</text>

  <!-- Arrows down to center -->
  <line x1="82" y1="120" x2="82" y2="145" stroke="#334155" stroke-width="1"/>
  <line x1="212" y1="120" x2="212" y2="145" stroke="#334155" stroke-width="1"/>
  <line x1="342" y1="120" x2="342" y2="145" stroke="#334155" stroke-width="1"/>
  <line x1="472" y1="120" x2="472" y2="145" stroke="#334155" stroke-width="1"/>
  <line x1="602" y1="120" x2="602" y2="145" stroke="#334155" stroke-width="1"/>
  <line x1="722" y1="120" x2="722" y2="145" stroke="#334155" stroke-width="1"/>

  <line x1="82" y1="145" x2="722" y2="145" stroke="#334155" stroke-width="1"/>
  <line x1="400" y1="145" x2="400" y2="160" stroke="#334155" stroke-width="1"/>
  <polyline points="395,156 400,163 405,156" stroke="#334155" stroke-width="1.5" fill="none"/>

  <!-- Central forecast() box -->
  <rect x="260" y="165" width="280" height="40" rx="8" fill="#020617" stroke="#10b981" stroke-width="2"/>
  <text x="400" y="190" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" font-weight="700" fill="#10b981">forecast(data, steps=12)</text>

  <!-- Output arrow -->
  <line x1="400" y1="205" x2="400" y2="225" stroke="#10b981" stroke-width="1.5"/>
  <polyline points="395,221 400,228 405,221" stroke="#10b981" stroke-width="1.5" fill="none"/>

  <text x="400" y="248" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#10b981">Same API, same result — regardless of input format</text>
</svg>