site_name: Vectrix
site_url: https://eddmpython.github.io/vectrix/
site_description: Zero-config time series forecasting library
site_author: eddmpython
repo_url: https://github.com/eddmpython/vectrix
repo_name: eddmpython/vectrix

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - i18n:
      languages:
        - locale: en
          name: English
          default: true
        - locale: ko
          name: 한국어
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            heading_level: 2
            docstring_style: numpy
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quickstart: getting-started/quickstart.md
  - User Guide:
    - Forecasting: guide/forecasting.md
    - Analysis & DNA: guide/analysis.md
    - Regression: guide/regression.md
    - Adaptive Intelligence: guide/adaptive.md
    - Business Intelligence: guide/business.md
    - Pipeline: guide/pipeline.md
    - Foundation Models: guide/foundation.md
    - Multivariate: guide/multivariate.md
  - API Reference:
    - Easy API: api/easy.md
    - Vectrix Class: api/vectrix.md
    - Adaptive: api/adaptive.md
    - Business: api/business.md
    - Regression: api/regression.md
    - Pipeline: api/pipeline.md
    - Foundation & Neural: api/foundation.md
    - Multivariate & Distributions: api/multivariate.md
    - Types: api/types.md
  - Benchmarks: benchmarks.md
  - Tutorials: tutorials/index.md
  - Changelog: changelog.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - pymdownx.snippets
  - toc:
      permalink: true
